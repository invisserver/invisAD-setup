<IfDefine OPENCLOUD>
	<IfModule mod_ssl.c>
		# Reverse-Proxy vHosts fuer openCloud
		<VirtualHost *:443>
    		ServerName opencloud.invis-server.loc

    		SSLEngine on
    		SSLCertificateFile /etc/apache2/ssl.crt/oc-sslint.crt
    		SSLCertificateKeyFile /etc/apache2/ssl.key/oc-sslint.key
    
    		<IfModule mod_proxy.c>
    			ProxyPreserveHost On
    			ProxyPass / http://127.0.0.1:9200/
    			ProxyPassReverse / http://127.0.0.1:9200/
    		</IfModule>

    		ErrorLog /var/log/apache2/cloud_error.log
    		CustomLog /var/log/apache2/cloud_access.log combined
		</VirtualHost>

		<VirtualHost *:443>
    		ServerName wopi.invis-server.loc

    		SSLEngine on
    		SSLCertificateFile /etc/apache2/ssl.crt/oc-sslint.crt
    		SSLCertificateKeyFile /etc/apache2/ssl.key/oc-sslint.key
    
    		<IfModule mod_proxy.c>
    			ProxyPreserveHost On
    			ProxyPass / http://127.0.0.1:9300/
    			ProxyPassReverse / http://127.0.0.1:9300/
    		</IfModule>

    		ErrorLog /var/log/apache2/wopi_error.log
    		CustomLog /var/log/apache2/wopi_access.log combined
		</VirtualHost>

		<VirtualHost *:443>
    		ServerName weboffice.invis-server.loc

    		SSLEngine on
    		SSLCertificateFile /etc/apache2/ssl.crt/oc-sslint.crt
    		SSLCertificateKeyFile /etc/apache2/ssl.key/oc-sslint.key
    
    		<IfModule mod_proxy.c>
    			ProxyPreserveHost On
    			AllowEncodedSlashes NoDecode

    			# WebSockets
    			ProxyPassMatch "/cool/(.*)/ws$" ws://127.0.0.1:9980/cool/$1/ws nocanon
    			ProxyPassMatch "^/cool/adminws$" ws://127.0.0.1:9980/cool/adminws

    			# Default routes
    			ProxyPass /cool http://127.0.0.1:9980/cool
    			ProxyPassReverse /cool http://127.0.0.1:9980/cool
    			ProxyPass /hosting/discovery http://127.0.0.1:9980/hosting/discovery
    			ProxyPassReverse /hosting/discovery http://127.0.0.1:9980/hosting/discovery
    			ProxyPass /browser http://127.0.0.1:9980/browser
    			ProxyPassReverse /browser http://127.0.0.1:9980/browser

    			# Important header for HTTPS connection
    			RequestHeader set X-Forwarded-Proto "https"

    			# Increase timeout limits
    			ProxyTimeout 300
    			ProxyIOBufferSize 65536
    		</IfModule>

    		ErrorLog /var/log/apache2/collabora_error.log
   		CustomLog /var/log/apache2/collabora_access.log combined
		</VirtualHost>

	</IfModule>
</IfDefine>
